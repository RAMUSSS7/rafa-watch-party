<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAFA - Ultimate Watch Party</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    
    <style>
        /* [احتفظت بكامل الـ CSS الخاص بك مع إضافة تنسيق الـ Modal والزر] */
        :root {
            --bg-gradient: linear-gradient(135deg, #060913 0%, #110a24 100%);
            --card-bg: rgba(20, 26, 46, 0.6);
            --border-color: #2c254e;
            --primary-purple: #8a2be2;
            --neon-blue: #00d2ff;
            --text-color: #ffffff;
            --text-muted: #a5a9b8;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-gradient); color: var(--text-color); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 25px; }
        .hidden { display: none !important; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; margin-bottom: 25px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h1, h2, h3 { margin-top: 0; font-weight: 700; background: linear-gradient(to right, var(--neon-blue), var(--primary-purple)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 18px; background: #121624; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 15px; }
        
        .btn-primary { width: 100%; padding: 15px; background: linear-gradient(to right, var(--primary-purple), #a04ef6); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-secondary { background: #1c183a; border: 1px solid var(--border-color); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Cinema & Floating Button */
        body.cinema-mode-active { background: #020205; }
        body.cinema-mode-active .container { max-width: 100%; padding: 10px; }
        body.cinema-mode-active .room-header, body.cinema-mode-active .card:not(.video-block):not(.chat-box) { display: none !important; }
        .exit-cinema-btn { position: fixed; top: 15px; right: 15px; z-index: 10000; background: rgba(239, 68, 68, 0.9); color: white; border: none; padding: 10px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; display: none; }
        body.cinema-mode-active .exit-cinema-btn { display: block !important; }

        /* Modal Styles */
        .modal-bg { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #161b33; padding: 25px; border-radius: 16px; width: 400px; border: 1px solid var(--primary-purple); }
        .cinema-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .video-block { background: #000; border-radius: 12px; overflow: hidden; min-height: 450px; }
    </style>
</head>
<body>

    <button id="exit-cinema-floating-btn" class="exit-cinema-btn">❌ Close Cinema Mode</button>

    <div id="video-search-modal" class="modal-bg hidden">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">YouTube URL</h3>
            <input type="text" id="modal-video-input" placeholder="Paste YouTube link...">
            <button id="modal-apply-btn" class="btn-primary">Apply Video</button>
            <button id="modal-close-btn" class="btn-secondary" style="width:100%">Close</button>
        </div>
    </div>

    <div class="container">
        <div id="cinema-container" class="hidden">
            <div class="card" style="padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; align-items: center;">
                <button id="yt-icon-trigger" style="background: none; border: none; cursor: pointer;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" width="45">
                </button>
                <button class="btn-secondary" id="cinema-toggle-btn">🎬 Cinema Mode</button>
            </div>
            </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
        // [هنا ضع كل الدوال الأصلية الخاصة بك]
        
        // أضفت هذه الأسطر فقط لربط الإضافات الجديدة:
        document.getElementById("yt-icon-trigger").onclick = () => document.getElementById("video-search-modal").classList.remove("hidden");
        document.getElementById("modal-close-btn").onclick = () => document.getElementById("video-search-modal").classList.add("hidden");
        document.getElementById("modal-apply-btn").onclick = () => {
            const url = document.getElementById("modal-video-input").value.trim();
            if(url) {
                socket.emit('video action', { type: 'change_src', url: url });
                loadVideoSource(url);
                document.getElementById("video-search-modal").classList.add("hidden");
            }
        };

        // [تكملة باقي دوالك الأصلية...]
    </script>
</body>
</html>
